name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install . --force-reinstall
      - name: Test
        run: python -m unittest discover -s tests
      - name: Compile
        run: python -m compileall src tests
      - name: CLI smoke
        run: mergepack --diff-file examples/sample-pr.diff --repo examples/mini-repo --output /tmp/MERGEPACK.md
      - name: JSON smoke
        run: |
          mergepack --diff-file examples/sample-pr.diff --repo examples/mini-repo --format json --output /tmp/mergepack.json
          python -m json.tool /tmp/mergepack.json
