name: mergepack
description: Turn a pull request diff into an agent-ready merge packet artifact.
author: Ilia Sorokin

inputs:
  repo:
    description: Repository path.
    required: false
    default: "."
  base:
    description: Base git ref.
    required: false
    default: "origin/main"
  head:
    description: Head git ref.
    required: false
    default: "HEAD"
  changed-files:
    description: Newline-delimited changed-file list path. When set, base/head diff lookup is skipped.
    required: false
    default: ""
  config:
    description: Optional mergepack JSON config path for commands and path role rules.
    required: false
    default: ""
  format:
    description: "Output format: markdown, json, html, or sarif."
    required: false
    default: "markdown"
  output:
    description: Output file path.
    required: false
    default: "MERGEPACK.md"
  upload-artifact:
    description: Upload the generated packet as a workflow artifact.
    required: false
    default: "true"
  pr-comment:
    description: Post or update a mergepack link comment on pull requests. Disabled by default.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Generate merge packet
      shell: bash
      env:
        PYTHONPATH: ${{ github.action_path }}/src
        MERGEPACK_REPO: ${{ inputs.repo }}
        MERGEPACK_BASE: ${{ inputs.base }}
        MERGEPACK_HEAD: ${{ inputs.head }}
        MERGEPACK_CHANGED_FILES: ${{ inputs.changed-files }}
        MERGEPACK_CONFIG: ${{ inputs.config }}
        MERGEPACK_FORMAT: ${{ inputs.format }}
        MERGEPACK_OUTPUT: ${{ inputs.output }}
      run: |
        args=(
          --repo "$MERGEPACK_REPO"
          --format "$MERGEPACK_FORMAT"
          --output "$MERGEPACK_OUTPUT"
        )
        if [ -n "$MERGEPACK_CONFIG" ]; then
          args+=(--config "$MERGEPACK_CONFIG")
        fi
        if [ -n "$MERGEPACK_CHANGED_FILES" ]; then
          args+=(--changed-files "$MERGEPACK_CHANGED_FILES")
        else
          args+=(--base "$MERGEPACK_BASE" --head "$MERGEPACK_HEAD")
        fi
        python -m mergepack "${args[@]}"
    - name: Upload merge packet
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mergepack
        path: ${{ inputs.output }}
    - name: Reject PR comment mode outside pull requests
      if: inputs.pr-comment == 'true' && github.event_name != 'pull_request'
      shell: bash
      run: |
        echo "::error::mergepack pr-comment mode only runs on pull_request events"
        exit 1
    - name: Comment on pull request
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        MERGEPACK_FORMAT: ${{ inputs.format }}
        MERGEPACK_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail

        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::mergepack pr-comment mode requires GitHub CLI (gh)"
          exit 1
        fi

        marker="<!-- mergepack-pr-comment -->"
        run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        comment_file="$(mktemp)"
        comments_file="$(mktemp)"
        payload_file="$(mktemp)"
        trap 'rm -f "$comment_file" "$comments_file" "$payload_file"' EXIT

        {
          printf '%s\n' "$marker"
          printf '### mergepack\n\n'
          printf 'Generated a `%s` merge packet for this pull request.\n\n' "$MERGEPACK_FORMAT"
          printf -- '- Output path: `%s`\n' "$MERGEPACK_OUTPUT"
          printf -- '- Workflow run: %s\n\n' "$run_url"
          printf 'When `upload-artifact` is `true`, download the packet from the workflow run artifacts.\n'
        } > "$comment_file"

        gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments?per_page=100" > "$comments_file"
        comment_id="$(
          python3 - "$comments_file" "$marker" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as handle:
            comments = json.load(handle)
        marker = sys.argv[2]
        for comment in comments:
            if marker in (comment.get("body") or ""):
                print(comment["id"])
                break
        PY
        )"
        python3 - "$comment_file" > "$payload_file" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as handle:
            print(json.dumps({"body": handle.read()}))
        PY

        if [ -n "$comment_id" ]; then
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --input "$payload_file" > /dev/null
        else
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" --input "$payload_file" > /dev/null
        fi
